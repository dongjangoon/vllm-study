apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      # DCGM GPU 메트릭
      - job_name: 'dcgm-exporter'
        static_configs:
          - targets: ['dcgm-exporter.monitoring.svc:9400']
      # vLLM 메트릭
      - job_name: 'vllm'
        static_configs:
          - targets: ['vllm-mistral.vllm.svc:8000']
