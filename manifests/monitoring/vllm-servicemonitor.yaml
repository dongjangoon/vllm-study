apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: vllm-mistral
  namespace: vllm
  labels:
    app: vllm-mistral
spec:
  selector:
    matchLabels:
      app: vllm-mistral
  endpoints:
  - port: http
    interval: 15s
    path: /metrics
  namespaceSelector:
    matchNames:
    - vllm
