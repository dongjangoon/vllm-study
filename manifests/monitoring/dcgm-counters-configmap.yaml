apiVersion: v1
kind: ConfigMap
metadata:
  name: dcgm-counters
  namespace: monitoring
data:
  counters.csv: |
    # Format: DCGM_FI_<field_id>, Prometheus metric type, help message
    # Basic metrics
    DCGM_FI_DEV_GPU_UTIL, gauge, GPU utilization
    DCGM_FI_DEV_FB_FREE, gauge, Free framebuffer memory
    DCGM_FI_DEV_FB_USED, gauge, Used framebuffer memory
    DCGM_FI_DEV_GPU_TEMP, gauge, GPU temperature
    DCGM_FI_DEV_POWER_USAGE, gauge, GPU power usage
    DCGM_FI_DEV_SM_CLOCK, gauge, SM clock frequency
    DCGM_FI_DEV_MEM_CLOCK, gauge, Memory clock frequency
    DCGM_FI_DEV_MEM_COPY_UTIL, gauge, Memory copy utilization
    DCGM_FI_DEV_ENC_UTIL, gauge, Encoder utilization
    DCGM_FI_DEV_DEC_UTIL, gauge, Decoder utilization
    # Profiling metrics (Tensor Core, SM, Memory)
    DCGM_FI_PROF_GR_ENGINE_ACTIVE, gauge, Graphics engine active ratio
    DCGM_FI_PROF_SM_ACTIVE, gauge, SM active ratio
    DCGM_FI_PROF_SM_OCCUPANCY, gauge, SM occupancy ratio
    DCGM_FI_PROF_PIPE_TENSOR_ACTIVE, gauge, Tensor Core active ratio
    DCGM_FI_PROF_DRAM_ACTIVE, gauge, DRAM active ratio
    DCGM_FI_PROF_PCIE_TX_BYTES, counter, PCIe TX bytes
    DCGM_FI_PROF_PCIE_RX_BYTES, counter, PCIe RX bytes
